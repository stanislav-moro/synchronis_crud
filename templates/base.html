<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Synchronis{% endblock %}</title>
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Synchronis — Панель управления</h1>
        </header>

        <nav>
            <a href="/companies" class="{% if '/companies' in request.url.path %}active{% endif %}">Компании</a>
            <a href="/price_lists" class="{% if '/price_lists' in request.url.path %}active{% endif %}">Прайс-листы</a>
            <a href="/column_mappings" class="{% if '/column_mappings' in request.url.path %}active{% endif %}">Маппинги</a>
        </nav>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
