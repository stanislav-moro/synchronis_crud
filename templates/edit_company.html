<!-- templates/edit_company.html -->
{% extends "base.html" %}

{% block title %}Редактировать компанию — Synchronis{% endblock %}

{% block content %}
    <h2>Редактировать компанию</h2>

    <form method="post" action="/companies/{{ company.id }}/edit">
        <label>
            Название:
            <input type="text" name="name" value="{{ company.name }}" required>
        </label>

        <button type="submit">Сохранить</button>
        <a href="/companies">Отмена</a>
    </form>
{% endblock %}
