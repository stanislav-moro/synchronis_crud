<!-- templates/edit_price_list.html -->
{% extends "base.html" %}

{% block title %}Редактировать прайс-лист — Synchronis{% endblock %}

{% block content %}
    <h2>Редактировать прайс-лист</h2>

    <form method="post" action="/price_lists/{{ price_list.id }}/edit">
        <label>
            Название:
            <input type="text" name="name" value="{{ price_list.name }}" required>
        </label>

        <label>
            <input type="checkbox" name="is_reference" value="true" {% if price_list.is_reference %}checked{% endif %}>
            Это эталонный прайс-лист
        </label>

        <button type="submit">Сохранить</button>
        <a href="/price_lists">Отмена</a>
    </form>
{% endblock %}
