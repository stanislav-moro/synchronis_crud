<!-- templates/edit_price_list.html -->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Редактировать прайс-лист — Synchronis</title>
    </head>
    <body>
        <h1>Редактировать прайс-лист</h1>
        <form method="post" action="/price_lists/{{ price_list.id }}/edit">
            <label>
                Название:
                <input type="text" name="name" value="{{ price_list.name }}" required style="padding: 4px; margin: 8px 0;">
            </label>
            <br>
            <label>
                <input type="checkbox" name="is_reference" value="true" {% if price_list.is_reference %}checked{% endif %}>
                Это эталонный прайс-лист
            </label>
            <br><br>
            <button type="submit">Сохранить</button>
            <a href="/price_lists" style="margin-left: 16px;">Отмена</a>
        </form>
    </body>
</html>
