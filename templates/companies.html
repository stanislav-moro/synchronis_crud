<!-- templates/companies.html -->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Компании — Synchronis</title>
        <style>
            table { border-collapse: collapse; width: 100%; }
            th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
            th { background-color: #f4f4f4; }
        </style>
    </head>
    <body>
        <!-- Навигационное меню -->
        <nav style="margin-bottom: 24px; padding: 12px; background-color: #f8f9fa; border-radius: 4px;">
            <a href="/companies" style="margin-right: 16px; text-decoration: none; color: #007bff; font-weight: bold;">Компании</a>
            <a href="/price_lists" style="margin-right: 16px; text-decoration: none; color: #28a745;">Прайс-листы</a>
            <a href="/column_mappings" style="margin-right: 16px; text-decoration: none; color: #dc3545;">Маппинги</a>
        </nav>
        <h1>КОМПАШКИ</h1>

        <!-- Система сообщений -->
        {% if message %}
        <div id="flash-message" style="
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid;
            {% if 'успешно' in message %}
                background-color: #d4edda; color: #155724; border-color: #c3e6cb;
            {% else %}
                background-color: #f8d7da; color: #721c24; border-color: #f5c6cb;
            {% endif %}
        ">
            {{ message }}
        </div>
        <script>
            setTimeout(() => {
                const msg = document.getElementById('flash-message');
                if (msg) {
                    msg.style.opacity = '0';
                    msg.style.transition = 'opacity 0.5s';
                    setTimeout(() => msg.style.display = 'none', 500);
                }
            }, 3000);
        </script>
        {% endif %}

        <form method="post" action="/companies">
            <label>
                Название компании:
                <input type="text" name="name" required style="margin: 8px 0; padding: 4px;">
            </label>
            <button type="submit">Добавить</button>
        </form>
        <hr>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Создана</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for company in companies %}
                <tr>
                    <td>{{ company.id }}</td>
                    <td>{{ company.name }}</td>
                    <td>{{ company.created_at }}</td>
                    <td>
                        <form method="post" action="/companies/{{ company.id }}/delete" style="display:inline;">
                            <button type="submit" onclick="return confirm('Удалить компанию?')">Удалить</button>
                        </form>
                        <a href="/companies/{{ company.id }}/edit" style="margin-left: 8px;">Редактировать</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </body>
</html>
