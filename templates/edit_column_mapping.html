<!-- templates/edit_column_mapping.html -->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Редактировать маппинг — Synchronis</title>
        <style>
            table { border-collapse: collapse; width: 100%; margin-top: 16px; }
            th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
            th { background-color: #f4f4f4; }
            .actions a, .actions form { display: inline; margin-right: 8px; }
            .json { font-family: monospace; background: #f9f9f9; padding: 4px; }
        </style>
    </head>
    <body>
        <!-- Навигационное меню (копия из других страниц) -->
        <nav style="margin-bottom: 24px; padding: 12px; background-color: #f8f9fa; border-radius: 4px;">
            <a href="/companies" style="margin-right: 16px; text-decoration: none; color: #007bff;">Компании</a>
            <a href="/price_lists" style="margin-right: 16px; text-decoration: none; color: #28a745;">Прайс-листы</a>
            <a href="/column_mappings" style="margin-right: 16px; text-decoration: none; color: #dc3545; font-weight: bold;">Маппинги</a>
        </nav>

        <h1>Редактировать маппинг</h1>

        <!-- Сообщение об ошибке -->
        {% if message %}
        <div id="flash-message" style="
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid;
            background-color: #f8d7da; color: #721c24; border-color: #f5c6cb;
        ">
            {{ message }}
        </div>
        <script>
            setTimeout(() => {
                const msg = document.getElementById('flash-message');
                if (msg) {
                    msg.style.opacity = '0';
                    msg.style.transition = 'opacity 0.5s';
                    setTimeout(() => msg.style.display = 'none', 500);
                }
            }, 3000);
        </script>
        {% endif %}

        <!-- Определяем ID для action безопасно -->
        {% set edit_id = prefill.id if prefill else mapping.id %}

        <form method="post" action="/column_mappings/{{ edit_id }}/edit">
            <label>
                Название:
                <input type="text" name="name" value="{{ prefill.name if prefill else mapping.name }}" required style="padding: 4px; margin: 8px 8px 8px 0;">
            </label>
            <br>
            <label>
                Тип источника:
                <select name="source_type" required>
                    <option value="supplier" {% if (prefill and prefill.source_type == 'supplier') or (not prefill and mapping.source_type == 'supplier') %}selected{% endif %}>Поставщик</option>
                    <option value="customer" {% if (prefill and prefill.source_type == 'customer') or (not prefill and mapping.source_type == 'customer') %}selected{% endif %}>Клиент</option>
                    <option value="internal" {% if (prefill and prefill.source_type == 'internal') or (not prefill and mapping.source_type == 'internal') %}selected{% endif %}>Внутренний</option>
                </select>
            </label>
            <br>
            <label>
                <input type="checkbox" name="is_default" value="true" {% if (prefill and prefill.is_default) or (not prefill and mapping.is_default) %}checked{% endif %}>
                По умолчанию
            </label>
            <br>
            <label>
                Маппинг (JSON):
                <textarea name="mapping" required style="width: 100%; height: 80px; margin: 8px 0;">{% if prefill %}{{ prefill.mapping | safe }}{% else %}{{ mapping.mapping | json_dumps }}{% endif %}</textarea>
            </label>
            <br>
            <label>
                Компания:
                <select name="company_id" required>
                    {% for company in companies %}
                        <option value="{{ company.id }}" {% if (prefill and prefill.company_id == company.id) or (not prefill and mapping.company_id == company.id) %}selected{% endif %}>{{ company.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <br><br>
            <button type="submit">Сохранить</button>
            <a href="/column_mappings" style="margin-left: 16px;">Отмена</a>
        </form>
    </body>
</html>
